# configs/unet_tusimple.yaml
# --------------------------
# U-Net baseline on TuSimple (Milestone 2)
# To train: python scripts/train.py --config configs/unet_tusimple.yaml

experiment:
  name: unet_tusimple
  output_dir: runs/unet_tusimple

dataset:
  name: tusimple
  root: data/tusimple
  image_size: [360, 640]
  augment: true

dataloader:
  # batch_size=8 OOMs on a 4GB RTX 2050 (peaks ~6.6GB and spills into slow
  # shared system RAM instead of erroring outright). batch_size=2 fits
  # cleanly at ~3.5GB peak.
  batch_size: 2
  num_workers: 4

model:
  name: unet
  base_channels: 64

loss:
  name: lane_points
  coord_weight: 1.0
  exist_weight: 1.0

optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4

scheduler:
  name: cosine
  T_max: 50

training:
  epochs: 50
  val_every: 5
  # Stop once val_loss hasn't improved for 3 consecutive checks (15 epochs).
  # epochs/T_max stay at 50 as a ceiling — the cosine schedule keeps
  # decaying normally up to whichever epoch we actually stop at.
  early_stopping_patience: 15

evaluation:
  threshold: 0.5   # existence-probability threshold, not a mask threshold
